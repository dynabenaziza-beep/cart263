<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative Data Artwork</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
      <div id="transition-screen"></div>
    <div id="transition-text"></div>


     <div id="three-container"></div>

    <div id="profile">
   <div id="message"></div>

   
  </div>
  <!-- ===== ARCHIVE SCREEN (overlay) ===== -->
    <div id="archive-screen">

      <div class="archive-title">A R C H I V E</div>

       <div id="archive-field"></div>

  <div id="archive-panel">
    <div class="panel-title">ARCHIVE ENTRY</div>
    <div>ID: <span id="panel-id">----</span></div>
    <div>Name: <span id="panel-name">----</span></div>
    <div>Country: <span id="panel-country">----</span></div>
    <div>Status: <span id="panel-status">----</span></div>
    <div>Cluster: <span id="panel-cluster">----</span></div>
  </div>

      <div class="archive-stats">
        <div>Users Generated: <span id="archive-users">0</span></div>
        <div>Dots Added: <span id="archive-dots">0</span></div>
        <div>Largest Cluster: <span id="archive-cluster">0</span></div>
        <div>Session Duration: <span id="archive-duration">00:00</span></div>
      </div>

      <div class="archive-analysis">
        <div>Profile Stability: <span id="archive-stability">STABLE</span></div>
        <div>User Control: <span id="archive-control">ACTIVE</span></div>
        <div>System Density: <span id="archive-density">BUILDING</span></div>
      </div>

      <div class="archive-restart">Press R to restart</div>

    </div>
    </div>
   
   <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r154/build/three.js"></script>
<script src="script.js"></script>
</body>
</html>
